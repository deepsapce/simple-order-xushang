server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/simple_order?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      # 如果需要密码可以在此配置

  # RocketMQ 配置
  rocketmq:
    name-server: 127.0.0.1:9876
    producer:
      group: health-producer-group

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 打印SQL，调试方便
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto    # 主键自增
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0