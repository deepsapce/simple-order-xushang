server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/simple_order?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    serialization:
      write-dates-as-timestamps: false

  data:
    redis:
      host: localhost
      port: 6379

  rocketmq:
    name-server: 127.0.0.1:9876
    producer:
      group: producer
    consumer:
      group: consumer

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0